version: "3.8"
services:
  postgres:
    image: postgres:15
    container_name: wayfarer_db
    environment:
      POSTGRES_USER: wayfarer
      POSTGRES_PASSWORD: wayfarer123
      POSTGRES_DB: wayfarer
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:latest
    container_name: wayfarer_valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    command: ["valkey-server", "--appendonly", "yes"]

volumes:
  postgres_data:
  valkey_data: